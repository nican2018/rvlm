name: rvlm
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
      - -e .
      - "numpy<2"
      - nibabel
      - Pillow
      - matplotlib
      - modal>=0.73.0
      - daytona>=0.128.1
      - prime-sandboxes>=0.2.0
      - dill>=0.3.7
      - ruff
      - pre-commit
      - anthropic>=0.75.0
      - google-genai>=1.56.0
      - openai>=2.14.0
      - portkey-ai>=2.1.0
      - pytest>=9.0.2
      - python-dotenv>=1.2.1
      - requests>=2.32.5
      - rich>=13.0.0
      - transformers>=4.45.0
      - accelerate>=1.0.0
      # Gemma 4 / hf_local: install torchvision to match your existing PyTorch (do not mix
      # random pip torchvision with conda CUDA torch). Examples:
      #   conda install torchvision -c pytorch -c nvidia   # same cuda metapackage as torch
      #   pip install torchvision --index-url https://download.pytorch.org/whl/cu124  # pick cu/cpu

